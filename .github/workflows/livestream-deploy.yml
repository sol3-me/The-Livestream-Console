name: Build & Deploy Livestream Console

on:
  push:
    branches: [master]
  workflow_dispatch:
    # Manual triggers are still allowed, but the job-level `if` below
    # ensures this only ever runs on the canonical repo / master ref.

concurrency:
  group: livestream-deploy
  cancel-in-progress: true

jobs:
  deploy:
    # Only run on the canonical repo and only on master.
    # This prevents fork PRs or copies of this workflow from executing
    # on the self-hosted runner.
    if: |
      github.repository == 'sol3uk/The-Livestream-Console' &&
      github.ref == 'refs/heads/master'
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      packages: write # required to push images to GHCR

    env:
      IMAGE: ghcr.io/sol3uk/the-livestream-console
      CONTAINER_NAME: livestream-console
      HOST_PORT: "8090"
      CONTAINER_PORT: "3000"
      # Path as seen inside the runner container.
      # Host path /mnt/user/appdata/github_runner/persistent_files is mounted at
      # /runner/persistent_files in myoung34/github-runner.
      ENV_FILE: /runner/persistent_files/livestream-console/.env.local

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preserve current latest as :previous (rollback image)
        # Pulls the existing :latest and retags it :previous before we overwrite it.
        # This gives us a one-step rollback; fails silently on first-ever deploy.
        run: |
          if docker pull ${{ env.IMAGE }}:latest 2>/dev/null; then
            docker tag  ${{ env.IMAGE }}:latest ${{ env.IMAGE }}:previous
            docker push ${{ env.IMAGE }}:previous
          fi

      - name: Set up Docker Buildx
        # Use the local Docker daemon driver so the image is available
        # immediately in the daemon after build (required for docker run below).
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # loaded into local daemon first; pushed manually next
          load: true
          tags: ${{ env.IMAGE }}:latest

      - name: Push :latest to GHCR
        run: docker push ${{ env.IMAGE }}:latest

      - name: Verify env file exists on host
        run: |
          if [ ! -f "${{ env.ENV_FILE }}" ]; then
            echo "ERROR: ${{ env.ENV_FILE }} not found on runner host."
            echo "Create it in the runner persistent files mount before deploying:"
            echo "  mkdir -p /runner/persistent_files/livestream-console"
            echo "  nano /runner/persistent_files/livestream-console/.env.local"
            exit 1
          fi

      - name: Restart container
        run: |
          docker rm -f "${{ env.CONTAINER_NAME }}" 2>/dev/null || true
          docker run -d \
            --name "${{ env.CONTAINER_NAME }}" \
            --restart unless-stopped \
            -p "${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }}" \
            --env-file "${{ env.ENV_FILE }}" \
            "${{ env.IMAGE }}:latest"

      - name: Clean up dangling images
        run: docker image prune -f
