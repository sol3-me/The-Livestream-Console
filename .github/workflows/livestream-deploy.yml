name: Build & Deploy Livestream Console

on:
  push:
    branches: [master]
  workflow_dispatch:
    # Manual triggers are still allowed, but the job-level `if` below
    # ensures this only ever runs on the canonical repo / master ref.

concurrency:
  group: livestream-deploy
  cancel-in-progress: true

jobs:
  deploy:
    # Only run on the canonical repo and only on master.
    # This prevents fork PRs or copies of this workflow from executing
    # on the self-hosted runner.
    if: |
      github.repository == 'sol3uk/The-Livestream-Console' &&
      github.ref == 'refs/heads/master'
    runs-on: [self-hosted, linux]
    permissions:
      contents: read

    env:
      HOME: /home/github
      IMAGE_NAME: livestream-console:latest
      CONTAINER_NAME: livestream-console
      HOST_PORT: "8090"
      CONTAINER_PORT: "3000"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Restart container
        run: |
          docker rm -f "${CONTAINER_NAME}" 2>/dev/null || true
          docker run -d \
            --name "${CONTAINER_NAME}" \
            --restart unless-stopped \
            -p ${HOST_PORT}:${CONTAINER_PORT} \
            -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            "${IMAGE_NAME}"

      - name: Cleanup old images
        run: docker image prune -f
